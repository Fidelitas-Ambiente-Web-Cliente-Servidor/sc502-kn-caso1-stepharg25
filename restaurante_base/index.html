<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osteria Francescana</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-contenido">
      <h1>Osteria Francescana</h1>
      <p>Tu restaurante favorito y experiencia gastronómica inolvidable.</p>
    </div>
  </header>

  <main class="contenedor">
    <section class="seccion-menu">
      <h2>Menú del Restaurante</h2>
      <div class="filtros-menu" role="tablist" aria-label="Filtrar categorías">
        <button class="boton-categoria activo" data-categoria="Todos">Todos</button>
        <button class="boton-categoria" data-categoria="Entrada">Entradas</button>
        <button class="boton-categoria" data-categoria="Plato Fuerte">Platos Fuertes</button>
        <button class="boton-categoria" data-categoria="Postre">Postres</button>
      </div>
      <div id="menu-container" class="grid-menu" aria-live="polite"></div>
    </section>

    <section class="seccion-reservas">
      <h2>Formulario de Reservas</h2>
      <form id="form-reserva" novalidate>
        <div class="campo-formulario">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana López" />
          <span class="error-campo" id="error-nombre"></span>
        </div>

        <div class="campo-formulario">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="Ej. correo@ejemplo.com" />
          <span class="error-campo" id="error-correo"></span>
        </div>

        <div class="campo-formulario grupo-dos-columnas">
          <div>
            <label for="fecha">Fecha de reserva</label>
            <input type="date" id="fecha" name="fecha" />
            <span class="error-campo" id="error-fecha"></span>
          </div>

          <div>
            <label for="hora">Hora</label>
            <select id="hora" name="hora">
              <option value="">Seleccione una hora</option>
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="18:00">18:00</option>
              <option value="19:00">19:00</option>
              <option value="20:00">20:00</option>
            </select>
            <span class="error-campo" id="error-hora"></span>
          </div>
        </div>

        <div class="campo-formulario">
          <label for="personas">Número de personas</label>
          <input type="number" id="personas" name="personas" min="1" max="20" placeholder="1" />
          <span class="error-campo" id="error-personas"></span>
        </div>

        <div class="campo-formulario">
          <label for="comentarios">Comentarios (opcional)</label>
          <textarea id="comentarios" name="comentarios" rows="4" placeholder="Deseo una mesa junto a la ventana"></textarea>
        </div>

        <button type="submit" id="boton-enviar" disabled>Enviar reserva</button>
        <div id="confirmacion-reserva" class="confirmacion-reserva" aria-live="polite"></div>
      </form>

      <div class="tabla-reservas-contenedor">
        <h3>Reservas registradas</h3>
        <table class="tabla-reservas">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
            </tr>
          </thead>
          <tbody id="reservas-tbody"></tbody>
        </table>
      </div>

      <div id="resumen-reservas" class="resumen-reservas" aria-live="polite"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
